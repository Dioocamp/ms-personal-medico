# ======================================================================
#  Pipeline CI/CD de ms-personal-medico  (EP3 - JVY0101)
#
#  develop -> solo build + test (integracion continua)
#  main    -> build + test, imagen a Docker Hub y despliegue en Swarm
#
#  Secrets requeridos (Settings > Secrets and variables > Actions):
#    DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, EC2_HOST, EC2_USER, EC2_SSH_KEY
# ======================================================================
name: CI/CD ms-personal-medico

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:

  # --------------------------------------------------------------
  # 1. Compila y ejecuta las pruebas; publica el reporte como
  #    artifact para trazabilidad de cada ejecucion.
  # --------------------------------------------------------------
  build-test:
    name: Build y pruebas (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compilar y ejecutar pruebas
        run: |
          chmod +x mvnw
          ./mvnw -B clean verify

      - name: Publicar reporte de pruebas (trazabilidad)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reportes-tests-ms-personal-medico
          path: target/surefire-reports/

  # --------------------------------------------------------------
  # 2. Construye la imagen Docker (multi-stage) y la publica en
  #    Docker Hub con dos tags: latest y el SHA del commit.
  # --------------------------------------------------------------
  docker-push:
    name: Imagen Docker a Docker Hub
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push (tags latest y SHA)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ms-personal-medico:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ms-personal-medico:${{ github.sha }}

  # --------------------------------------------------------------
  # 3. Actualiza el servicio en el cluster Docker Swarm (EC2).
  #    Se usa el tag por SHA: despliegue deterministico y con
  #    rollback trivial a cualquier version anterior.
  # --------------------------------------------------------------
  deploy-swarm:
    name: Despliegue en Docker Swarm
    needs: docker-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Actualizar el servicio en el nodo manager
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker service update \
              --image ${{ secrets.DOCKERHUB_USERNAME }}/ms-personal-medico:${{ github.sha }} \
              --with-registry-auth \
              clinica_ms-personal-medico
