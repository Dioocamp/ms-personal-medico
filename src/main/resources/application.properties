# ====================================================================
#  PERFIL POR DEFECTO  ->  MySQL (base de datos relacional principal)
#
#  Toda la configuracion dependiente del entorno se externaliza en
#  variables de entorno (12-factor): en desarrollo local aplican los
#  valores por defecto y en Docker/Swarm/nube se inyectan desde el
#  docker-compose.yml o el pipeline CI/CD.
# ====================================================================
spring.application.name=ms-personal-medico
server.port=${SERVER_PORT:8081}

# --- Conexion a MySQL ------------------------------------------------
# createDatabaseIfNotExist=true crea el esquema 'clinica_personal' si no existe.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/clinica_personal?createDatabaseIfNotExist=true&serverTimezone=America/Santiago&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate -------------------------------------------------
# update: Hibernate crea/actualiza las tablas a partir de las entidades.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# En MySQL no ejecutamos el data.sql (los datos se crean en vivo por la API).
spring.sql.init.mode=never

# --- Actuator: health check para Docker / Swarm ----------------------
# El HEALTHCHECK del Dockerfile consulta /actuator/health.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# --- Proteccion de acceso via API Gateway ----------------------------
# Si GATEWAY_SECRET esta definido, toda peticion a /api/** debe traer la
# cabecera 'x-gateway-secret' (la inyecta el API Gateway en la integracion).
clinica.gateway.secret=${GATEWAY_SECRET:}

# --- Documentacion OpenAPI / Swagger UI -----------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
