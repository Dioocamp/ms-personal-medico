# ====================================================================
#  PERFIL POR DEFECTO  ->  MySQL (base de datos relacional principal)
# ====================================================================
spring.application.name=ms-personal-medico
server.port=8081

# --- Conexion a MySQL ------------------------------------------------
# createDatabaseIfNotExist=true crea el esquema 'clinica_personal' si no existe.
spring.datasource.url=jdbc:mysql://localhost:3306/clinica_personal?createDatabaseIfNotExist=true&serverTimezone=America/Santiago&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate -------------------------------------------------
# update: Hibernate crea/actualiza las tablas a partir de las entidades.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# En MySQL no ejecutamos el data.sql (los datos se crean en vivo por la API).
spring.sql.init.mode=never

# --- Documentacion OpenAPI / Swagger UI -----------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
