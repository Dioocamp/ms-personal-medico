# ====================================================================
#  PERFIL 'h2'  ->  Base de datos embebida en memoria (sin instalar nada)
#  Activar con:  mvn spring-boot:run -Dspring-boot.run.profiles=h2
#            o:  java -jar target\ms-personal-medico-1.0.0.jar --spring.profiles.active=h2
# ====================================================================
spring.application.name=ms-personal-medico
server.port=8081

# --- Conexion a H2 (en memoria) -------------------------------------
spring.datasource.url=jdbc:h2:mem:clinica_personal;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate -------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Carga datos de ejemplo (data.sql) DESPUES de que Hibernate cree las tablas.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- Consola web de H2:  http://localhost:8081/h2-console -----------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.path=/swagger-ui.html
